name: Extract and Commit Trial Count

on:
  push:
    branches:
      - main
  workflow_dispatch: {}

jobs:
  extract-and-commit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r ./requirements.txt

      - name: Run Python script and extract Trial Count
        id: analyse-daily-wordle
        run: |
          python model.py -i

      - name: Extract trial count from logs
        id: extract-trial-count
        run: |
          echo "::set-output name=trial_count::$(echo ${{ steps.Analyse_daily_wordle.outputs.stdout }} | grep -oP 'Trial Count:\K[^ ]+')"

      - name: Commit and push changes to branch
        run: |
          git config --global user.name 'GitHub Actions'
          git config --global user.email 'actions@github.com'
          git add trial_count.txt
          git checkout -b data
          git commit -m "Update Trial Count"
          git push origin main
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
